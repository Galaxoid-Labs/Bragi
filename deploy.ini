# deploy.ini — packaging metadata for Bragi.
#
# Fill in the values below; the build script (TBD: build_package.sh /
# package.odin) reads this file at packaging time and writes the per-
# platform manifests:
#
#   macOS:   dist/macos/Bragi.app/Contents/Info.plist
#            (and codesigns + makes a .dmg if codesign_identity is set)
#   Linux:   dist/linux/Bragi.AppDir/{bragi.desktop,usr/share/icons/...}
#            (then wrapped into Bragi-x86_64.AppImage)
#   Windows: dist/windows/{Bragi.exe,SDL3.dll,SDL3_ttf.dll,bragi.ico}
#            (zipped; the .ico is also linked into the .exe via a
#            generated resource script)
#
# All keys are optional unless marked REQUIRED. Anything left blank
# falls back to a sensible default (most often: the value from
# [common]).

# ──────────────────────────────────────────────────────────────────
# Shared metadata. Used by every platform unless overridden in the
# per-platform section below.
# ──────────────────────────────────────────────────────────────────
[common]

# REQUIRED. Human-readable display name. Shown in window titles, the
# macOS Dock, the Windows Start menu, the Linux .desktop entry.
name        = Bragi

# REQUIRED. Lowercase, no spaces — used as the Linux binary name, the
# AppImage filename, the Windows .exe stem, and the macOS bundle
# executable name.
binary_name = bragi

# REQUIRED. Reverse-DNS identifier. macOS uses it as
# CFBundleIdentifier, Windows as the AppUserModelID, Linux as the
# .desktop StartupWMClass.
identifier  = com.galaxoidlabs.bragi

# REQUIRED. Marketing version string. Threaded into Info.plist
# (CFBundleShortVersionString), the Windows resource FILEVERSION /
# PRODUCTVERSION, the AppImage update-info, and Bragi's `--version`
# output.
version     = 0.1.0

# REQUIRED. Author / vendor — appears in the macOS "Get Info" panel
# and the Windows file-properties Author field.
author      = Jacob Davis

# REQUIRED. Copyright line — Info.plist NSHumanReadableCopyright and
# Windows LegalCopyright.
copyright   = Copyright © 2026 Galaxoid Labs

# REQUIRED. One-line tagline. .desktop Comment=, Info.plist
# CFBundleGetInfoString, Windows FileDescription. Keep under ~120 chars.
description = A small GPU-accelerated, vim-flavoured text/code editor

# Optional. Project / homepage URL. Embedded into the AppImage update
# metadata and the Windows VERSIONINFO.
url         = https://github.com/Galaxoid-Labs/Bragi

# REQUIRED for distribution. SPDX identifier — must match the LICENSE
# file at the repo root (which the build script will copy into every
# package). Common picks: MIT, BSD-2-Clause, Apache-2.0, GPL-3.0-only.
license     = MIT

# Optional. Path to the source icon, relative to the repo root. The
# build script generates the per-platform variants from this PNG (1024x1024
# recommended, full alpha supported). Leave blank to ship without an
# icon (the app will still build / run; the OS will show a generic
# icon instead).
icon_png    = icon.png


# ──────────────────────────────────────────────────────────────────
# macOS packaging.
# ──────────────────────────────────────────────────────────────────
[macos]

# Minimum macOS version (LSMinimumSystemVersion). 11.0 = Big Sur,
# matches SDL3's lowest-supported target.
min_os_version    = 11.0

# Apple Developer "Application Category" — drives Launchpad grouping.
# Common values for an editor:
#   public.app-category.developer-tools
#   public.app-category.utilities
#   public.app-category.productivity
category          = public.app-category.developer-tools

# Code-signing identity (Developer ID Application). Leave blank to
# build an unsigned bundle — it'll still run, but Gatekeeper will
# show a "downloaded from internet" prompt on first launch. Example:
#   "Developer ID Application: Yancy Davis (TEAMID12345)"
codesign_identity =

# Apple ID + app-specific password for notarization. Only used when
# codesign_identity is set. Notarization is required for unattended
# distribution to non-developer machines.
notarize_apple_id =
notarize_password =
notarize_team_id  =

# File-type associations (CFBundleDocumentTypes). One extension per
# line, comma-separated. Empty = Bragi is launchable but not
# registered as a handler for any file type. Example:
#   document_extensions = txt,md,odin,c,h,cpp,hpp,go,swift,jai
document_extensions = txt,md,odin,c,h,cpp,hpp,go,swift,jai

# DMG settings. dmg_format = UDZO is compressed; UDRO uncompressed.
dmg_format        = UDZO


# ──────────────────────────────────────────────────────────────────
# Linux packaging (AppImage).
# ──────────────────────────────────────────────────────────────────
[linux]

# Semicolon-separated XDG menu categories. Common picks:
#   Development;TextEditor;
#   Utility;TextEditor;
categories     = Development;TextEditor;

# Optional list of MIME types Bragi should register as a handler for.
# Semicolon-separated; empty = no associations. Example:
#   mime_types = text/plain;text/x-odin;text/x-csrc;text/x-c++src;
mime_types     = text/plain;text/x-odin;text/x-csrc;text/x-c++src;


# Comma-separated keywords for desktop-environment search.
keywords       = editor,vim,modal,code,text

# AppImage compression. zstd is the modern default; gzip is broader-
# compatible with older systems. Currently unused — Linux packaging
# went .deb + .rpm, not AppImage. Left in case we add it later.
appimage_compression = zstd

# Maintainer email — required by the .deb format (Maintainer: field
# is `Name <email>`). Falls back to a no-reply address if blank, but
# Lintian will warn about that.
maintainer_email     =

# Comma-separated runtime dependencies the .deb declares. apt will
# install these alongside Bragi. Adjust if your target distros use
# different package names — Ubuntu 24.04+ / Debian sid have these.
deb_depends          = libsdl3-0, libsdl3-ttf0, libvterm0

# Same idea for the .rpm. Names match Fedora 40+. RHEL/Alma/Rocky
# may need EPEL or different package names depending on version.
rpm_requires         = SDL3, SDL3_ttf, libvterm

# Pacman dependency names for the .pkg.tar.zst built locally on an
# Arch host. Used both by the local-build stage in package_linux.sh
# and as a reference for the AUR PKGBUILDs in tools/aur/.
pacman_depends       = sdl3, sdl3_ttf, libvterm


# ──────────────────────────────────────────────────────────────────
# Windows packaging.
# ──────────────────────────────────────────────────────────────────
[windows]

# AppUserModelID — used for taskbar grouping / pinning. Defaults to
# `identifier` from [common] if blank.
app_user_model_id =

# Per-monitor DPI awareness. Bragi uses GetWindowPixelDensity for
# its own scaling, so PerMonitorV2 is the right value. Set to
# `system` only if you hit driver-specific issues.
dpi_awareness     = PerMonitorV2

# File-type associations registered with the OS. Comma-separated
# extensions; the build script writes a registry-import .reg file
# that the user can apply (or that the installer applies for them).
document_extensions =

# Output format. `zip` = portable bundle (Bragi.exe + DLLs in a
# zip, no install). `nsis` = single-exe installer built with NSIS
# (requires `makensis` on PATH). v1 default is zip.
package_format    = zip
